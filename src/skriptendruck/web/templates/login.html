{% extends "base.html" %}

{% block title %}Anmelden{% endblock %}

{% block content %}
<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="login-card card shadow-lg border-0" style="max-width: 420px; width: 100%;">
        <div class="card-body p-5">
            <!-- Logo / Header -->
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 72px; height: 72px;">
                    <i class="bi bi-printer-fill fs-1"></i>
                </div>
                <h3 class="fw-bold text-dark">Skriptendruck</h3>
                <p class="text-muted small">Fachschaft Maschinenbau – OTH Regensburg</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" autocomplete="on">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">
                        <i class="bi bi-person me-1"></i> RZ-Kennung / Benutzername
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           placeholder="z.B. abc12345" required autofocus autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">
                        <i class="bi bi-lock me-1"></i> Passwort
                    </label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                           placeholder="Passwort" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Anmelden
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    <i class="bi bi-shield-lock me-1"></i>
                    Zugang nur für Mitglieder der Gruppen<br>
                    <strong>Vorstand</strong>, <strong>IT</strong> oder <strong>Skriptendruck</strong>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
